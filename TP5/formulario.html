<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-card shadow-sm rounded-4 bg-white p-5 mt-5">
            <h1 class="form-title text-center mb-4">Registro de Usuario</h1>

            <!-- Mensaje de resultado general -->
            <div id="formResult" class="alert d-none" role="alert"></div>

            <!-- Formulario de registro -->
            <form id="formulario" novalidate>
                <!-- Campo Nombre -->
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre *</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
                    <div class="invalid-feedback"></div>
                </div>

                <!-- Campo Apellido -->
                <div class="mb-3">
                    <label for="apellido" class="form-label">Apellido *</label>
                    <input type="text" class="form-control" id="apellido" placeholder="Ingrese su apellido">
                    <div class="invalid-feedback"></div>
                </div>

                <!-- Campo Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" placeholder="usuario@ucasal.edu.ar">
                    <div class="invalid-feedback"></div>
                    <small class="form-text text-muted">Solo se aceptan correos institucionales de UCASAL (@ucasal)</small>
                </div>

                <!-- Campo Fecha de Nacimiento -->
                <div class="mb-3">
                    <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento *</label>
                    <input type="date" class="form-control" id="fechaNacimiento">
                    <div class="invalid-feedback"></div>
                    <small class="form-text text-muted">Debe tener entre 18 y 40 años</small>
                </div>

                <!-- Campo Contraseña -->
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña *</label>
                    <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
                    <div class="invalid-feedback"></div>
                    <div class="password-display mt-2 d-none">
                        <small class="text-muted">Contraseña cifrada: <span id="passwordDisplay"></span></small>
                    </div>
                </div>

                <!-- Campo Confirmar Contraseña -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña *</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repita su contraseña">
                    <div class="invalid-feedback"></div>
                </div>

                <!-- Botón de envío -->
                <button type="submit" class="btn btn-primary w-100 btn-lg mt-4">Enviar</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
